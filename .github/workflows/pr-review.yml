name: Krnl-AI PR Review
on:
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Diff
        id: diff
        shell: bash
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr-diff.txt
          echo "diff_size=$(wc -c < /tmp/pr-diff.txt)" >> $GITHUB_OUTPUT

      - name: Krnl-AI Review
        if: steps.diff.outputs.diff_size < 50000
        id: krnlai
        uses: ./.github/actions/krnlai
        with:
          prompt: >
            Review this PR diff. Focus on:
            1. Bugs and logic errors
            2. Security vulnerabilities
            3. Code quality issues
            4. Missing tests or error handling
            Be concise. Format as markdown with bullet points.
          timeout: 120

      - name: Post Review Comment
        if: steps.krnlai.outputs.result != ''
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## 🤖 Krnl-AI PR Review\n\n${process.env.AI_RESULT}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('## 🤖 Krnl-AI PR Review'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
        env:
          AI_RESULT: ${{ steps.krnlai.outputs.result }}

      - name: Skip Review (diff too large)
        if: steps.diff.outputs.diff_size >= 50000
        run: echo "Skipping review (diff size: ${{ steps.diff.outputs.diff_size }} bytes)"
